aid: microsoft-dynamics-365-business-central
name: Microsoft Dynamics 365 Business Central
description: >-
  Microsoft Dynamics 365 Business Central is an all-in-one cloud ERP solution
  for small and mid-sized businesses that brings together finance, sales,
  service, project management, supply chain, manufacturing, and operations on
  the Microsoft Cloud. Business Central exposes a standard REST API (v2.0)
  plus custom and OData web services so partners can build Connect apps,
  automate processes, and integrate Business Central with Power Platform and
  third-party systems using OAuth 2.0 authentication via Microsoft Entra ID.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - ERP
  - Cloud ERP
  - Finance
  - Accounting
  - Supply Chain
  - Operations
  - Small Business
  - Mid-Market
  - Microsoft Dynamics 365
